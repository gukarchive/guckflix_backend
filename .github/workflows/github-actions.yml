# github repository actions 페이지에 나타날 이름
name: CI/CD using github actions & docker

# main에 push가 되었을 때 실행
on:
  push:
    branches: [ "master", "main" ]
    
jobs:
  CI-CD:
    runs-on: [self-hosted, Windows, X64]
    steps:

      # JDK setting - github actions에서 사용할 JDK 설정
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # gradle build
      - name: Build with Gradle
        run: .\gradlew.bat build -x test

      # docker build & push to production
      - name: Docker build & push to prod
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -f Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/guckflix_api .
          docker push ${{ secrets.DOCKER_USERNAME }}/guckflix_api

      ## deploy to production
      - name: Deploy to prod
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          docker compose -f "${{ secrets.DEPLOY_DIR }}\\docker-compose.yml" pull backend
          docker compose -f "${{ secrets.DEPLOY_DIR }}\\docker-compose.yml" up -d backend nginx
